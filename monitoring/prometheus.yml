global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert.rules.yml

scrape_configs:
  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # WhatsApp Bot API — scrapes /metrics directly on the internal Docker network
  # (bypasses nginx which restricts /metrics to internal IPs)
  - job_name: whatsapp-bot-api
    static_configs:
      - targets: ['api:4000']
    metrics_path: /metrics
    scrape_interval: 15s
